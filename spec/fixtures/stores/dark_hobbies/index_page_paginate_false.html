<!doctype html>
<html>
  <head> </head>

  <body class="page-width-narrow card-hover-effect-none">
    <main
      id="MainContent"
      class="content-for-layout"
      role="main"
      data-page-transition-enabled="false"
      data-product-transition="false"
      data-template="collection"
    >
      <div
        id="shopify-section-template--20087817732350__main"
        class="shopify-section"
      >
        <results-list
          class="section product-grid-container color-scheme-1"
          style="--padding-block-start: 0px; --padding-block-end: 32px"
          section-id="template--20087817732350__main"
          infinite-scroll="true"
        >
          <div class="collection-wrapper grid gap-style">
            <div
              id="ResultsList"
              class="grid main-collection-grid collection-wrapper--full-width-on-mobile spacing-style"
              style="
                --grid--margin--mobile: 0 0;
                --grid-column--desktop: var(--centered);
                --grid-column--mobile: var(--full-width);
                --padding-inline-start: 0px;
                --padding-inline-end: 0px;
              "
            >
              <div
                style="
                  grid-column: var(--full-width);
                  --product-grid-gap-mobile: 12px 12px;
                  --product-grid-gap-desktop: 24px 16px;
                  container-type: inline-size;
                  container-name: product-grid;
                "
              >
                <span ref="viewMorePrevious"></span>

                <ul
                  class="product-grid product-grid--template--20087817732350__main product-grid--grid"
                  data-testid="product-grid"
                  product-grid-view="default"
                  ref="grid"
                  role="list"
                  data-last-page="9"
                  data-product-card-size="medium"
                  style="--mobile-columns: 2"
                ></ul>
              </div>
            </div>
          </div>
        </results-list>
      </div>
    </main>
  </body>
</html>
